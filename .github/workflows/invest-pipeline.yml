name: Invest Instagram Pipeline

on:
  repository_dispatch:
    types: [invest_pipeline]
  schedule:
    # Mon, Wed, Fri at 09:00 KST (00:00 UTC)
    - cron: "0 0 * * 1,3,5"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_MODE: ${{ vars.INSTAGRAM_MODE || 'manual' }}
      IMAGE_PUBLIC_URL: ${{ vars.IMAGE_PUBLIC_URL }}
      # topic from repository_dispatch payload (empty on scheduled runs)
      TOPIC_ID: ${{ github.event.client_payload.topic_id || 'semiconductor_trend' }}
      ANALYSIS_TYPE: ${{ github.event.client_payload.analysis_type || 'sector_trend' }}
      TICKERS: ${{ github.event.client_payload.tickers || '000660,005930,000990,042700,066570' }}
      SECTOR: ${{ github.event.client_payload.sector || '반도체' }}
      TOPIC_LABEL: ${{ github.event.client_payload.topic_label || '반도체 섹터 동향' }}
      SLACK_USER_ID: ${{ secrets.SLACK_USER_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        id: install
        run: pip install -r requirements.txt

      - name: Install Korean fonts
        run: |
          sudo apt-get install -y fonts-nanum
          fc-cache -fv

      - name: Collect data
        id: collect
        run: python scripts/data_collector.py

      - name: Analyze data
        id: analyze
        run: python scripts/analysis_engine.py

      - name: Generate card
        id: generate_card
        run: python scripts/generate_card.py

      - name: Notify Slack
        id: slack_notify
        run: python scripts/slack_notifier.py

      - name: Publish to Instagram
        id: instagram
        run: python scripts/instagram_publisher.py

      - name: Notify failure
        if: failure()
        env:
          FAILED_STEP: ${{ steps.collect.conclusion == 'failure' && 'collect' || steps.analyze.conclusion == 'failure' && 'analyze' || steps.generate_card.conclusion == 'failure' && 'generate_card' || steps.slack_notify.conclusion == 'failure' && 'slack_notify' || steps.instagram.conclusion == 'failure' && 'instagram' || 'unknown' }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ERROR_MESSAGE: "GitHub Actions run failed. Check the run log for details."
        run: python scripts/slack_failure_notifier.py
